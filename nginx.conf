server {
    listen 80;
    server_name agnus;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name agnus;

    server_tokens off;
    client_max_body_size 20m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self'; font-src 'self' data:; connect-src 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/nginx/certs/agnus.pem;
    ssl_certificate_key /etc/nginx/certs/agnus-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
